<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2018 Data Challenge Plot Gallery</title>
  <style>
    :root {
      --bg-top: #f7f1e4;
      --bg-bottom: #e8dcc4;
      --panel: rgba(255, 250, 240, 0.9);
      --card: #fffdf8;
      --text: #1f2933;
      --muted: #52606d;
      --accent: #a44a1a;
      --border: rgba(82, 96, 109, 0.18);
      --shadow: 0 16px 36px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #ffffff;
    }

    .page {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .hero {
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
    }

    .intro {
      margin: 0;
      max-width: 70ch;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      border: 1px solid rgba(164, 74, 26, 0.18);
      background: rgba(164, 74, 26, 0.08);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .toolbar label {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .toolbar input {
      width: min(320px, 100%);
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid #d8d8d8;
      background: #ffffff;
      font: inherit;
      color: var(--text);
    }

    .count {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      background: #ffffff;
      border: 2px solid #d8d8d8;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: none;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: none;
    }

    .card a {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .frame {
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: #ffffff;
    }

    .frame img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
      display: block;
    }

    .caption {
      padding: 14px 16px 16px;
    }

    .caption strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1rem;
    }

    .caption span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .empty {
      display: none;
      padding: 22px;
      border-radius: 18px;
      background: #ffffff;
      border: 2px solid #d8d8d8;
      color: var(--muted);
      text-align: center;
    }

    footer {
      text-align: center;
      color: var(--muted);
      margin-top: 24px;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1220px);
        padding-top: 18px;
      }

      .hero {
        padding: 22px 18px;
      }

      .toolbar input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>2018 Data Challenge Plot Gallery</h1>
    </header>

    <section class="toolbar" aria-label="Gallery controls">
      <label>
        Find a plot
        <input id="search" type="search" placeholder="Try 001, 127, or ulwdc1_127_W149" />
      </label>
      <div class="count" id="visible-count">Showing 293 of 293</div>
    </section>

    <main class="gallery" id="gallery"></main>
    <div class="empty" id="empty-state">No plots matched that search.</div>

    <footer>Open this file locally or publish it with the repository to share the gallery.</footer>
  </div>

  <script>
    const plots = Array.from({ length: 293 }, (_, index) => {
      const number = String(index + 1).padStart(3, '0');
      const name = `ulwdc1_${number}_W149`;
      return {
        number,
        name,
        label: `Plot ${index + 1}`,
        src: `plots/${name}.png`
      };
    });

    const gallery = document.getElementById('gallery');
    const searchInput = document.getElementById('search');
    const visibleCount = document.getElementById('visible-count');
    const emptyState = document.getElementById('empty-state');


    function render(items) {
      gallery.innerHTML = '';

      items.forEach((plot, index) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <a href="${plot.src}" target="_blank" rel="noreferrer">
            <div class="frame">
              <img src="${plot.src}" alt="${plot.name}" loading="lazy" />
            </div>
            <div class="caption">
              <strong>${plot.name}</strong>
              <span>${plot.label}</span>
            </div>
          </a>
        `;
        card.dataset.search = `${plot.number} ${plot.name} ${index + 1}`.toLowerCase();
        gallery.appendChild(card);
      });

      visibleCount.textContent = `Showing ${items.length} of ${plots.length}`;
      emptyState.style.display = items.length === 0 ? 'block' : 'none';
    }

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = query
        ? plots.filter((plot, index) => `${plot.number} ${plot.name} ${index + 1}`.toLowerCase().includes(query))
        : plots;
      render(filtered);
    });

    render(plots);
  </script>
</body>
</html>
